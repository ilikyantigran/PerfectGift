syntax = "proto3";

package notification.v1;

import "validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/ilikyantigran/PerfectGift/services/backend/api-gateway/pkg/api/notification/v1;notificationv1";

// NotificationService owns device-token registration for push fan-out.
// Everything else this service does is bus-driven (see the NATS consumers and
// the outbox dispatcher); the only synchronous surface is device registration.
service NotificationService {
  // RegisterDevice upserts a device by its push token (owner-scoped).
  // REST: POST /v1/devices
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse) {
    option (google.api.http) = {
      post: "/v1/devices"
      body: "*"
    };
  }

  // UnregisterDevice deactivates a device on sign-out / uninstall. Idempotent.
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse) {
    option (google.api.http) = {
      delete: "/v1/devices/{push_token}"
    };
  }
}

// Platform of the target device.
enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_IOS = 1;
  PLATFORM_ANDROID = 2;
}

message RegisterDeviceRequest {
  string user_id = 1 [(validate.rules).string.min_len = 1];
  Platform platform = 2 [(validate.rules).enum = {defined_only: true, not_in: 0}];
  string push_token = 3 [(validate.rules).string.min_len = 1];
  string app_version = 4;
}

message RegisterDeviceResponse {
  string device_id = 1;
}

message UnregisterDeviceRequest {
  string push_token = 1 [(validate.rules).string.min_len = 1];
}

message UnregisterDeviceResponse {
  bool ok = 1;
}
