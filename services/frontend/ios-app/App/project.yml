# XcodeGen spec for the PerfectGift iOS app target.
#
# This generates PerfectGift.xcodeproj that builds the SwiftUI app and links the local
# PerfectGiftKit Swift package (../). A .xcodeproj is deliberately NOT committed — it is
# generated so there is a single source of truth and no merge-conflict-prone pbxproj.
#
#   brew install xcodegen        # once
#   cd App && xcodegen generate  # produces PerfectGift.xcodeproj
#   open PerfectGift.xcodeproj
#
name: PerfectGift
options:
  bundleIdPrefix: app.perfectgift
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  PerfectGiftKit:
    path: ..            # the Swift package in services/frontend/ios-app

targets:
  PerfectGift:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "**/*.md"
    dependencies:
      - package: PerfectGiftKit
        product: PerfectGiftKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.perfectgift.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/PerfectGift.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Resources/Info.plist
