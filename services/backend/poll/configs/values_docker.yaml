# Config for running in Docker/compose (service-name addresses).
# Same keys as values_local.yaml; only the values differ.
poll_service:
  host: localhost          # in-container gateway dials its own gRPC server
  grpc_port: "9090"
  http_port: "8080"

postgres:
  dsn: postgres://postgres:postgres@postgres:5432/poll?sslmode=disable

valkey:
  address: valkey:6379

nats:
  url: nats://nats:4222
  stream: POLL
  subject: poll.completed

security:
  jwt_secret: "change-me-in-real-deploys"

tokens:
  default_ttl_seconds: 604800 # 7 days

ratelimit:
  per_token_budget: 5
  per_token_window: 3600
  per_ip_budget: 30
  per_ip_window: 3600

web:
  allowed_origin: "https://poll.perfectgift.app"
  link_path: "/p/{token}"
