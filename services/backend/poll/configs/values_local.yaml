# Config for running locally with `go run` (host addresses).
# Same keys as values_docker.yaml; only the values differ.
poll_service:
  host: localhost
  grpc_port: "8080"
  http_port: "8081"

postgres:
  dsn: postgres://postgres:postgres@localhost:5432/poll?sslmode=disable

valkey:
  address: 127.0.0.1:6379

nats:
  url: nats://127.0.0.1:4222
  stream: POLL
  subject: poll.completed

security:
  jwt_secret: "local-dev-only-change-me"

tokens:
  default_ttl_seconds: 604800 # 7 days

ratelimit:
  per_token_budget: 5
  per_token_window: 3600
  per_ip_budget: 30
  per_ip_window: 3600

web:
  allowed_origin: "http://localhost:5173"
  link_path: "/p/{token}"
