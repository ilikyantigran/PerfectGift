syntax = "proto3";

package poll.v1;

option go_package = "github.com/ilikyantigran/PerfectGift/services/backend/api-gateway/pkg/api/poll/v1;pollv1";

// Local copy of the Poll service gRPC contract, limited to the RPCs the API Gateway
// calls. Derived from services/backend/poll/SERVICE.md §3.1.

message Question {
  string id = 1;
  string text = 2;
  string kind = 3; // e.g. single_choice | multi_choice | free_text
  repeated string options = 4;
}

message Answer {
  string question_id = 1;
  string value = 2;
  repeated string values = 3;
}

// owner_user_id is injected by the gateway from the JWT subject, not the body.
message CreatePollRequest {
  string owner_user_id = 1;
  string title = 2;
  repeated Question questions = 3;
  string surprise_request_id = 4;
  int64 ttl_seconds = 5;
}

message CreatePollResponse {
  string poll_id = 1;
  string link_token = 2; // raw token, returned once
  string link_url = 3;
  string expires_at = 4;
}

message GetPollByTokenRequest {
  string token = 1;
}

message GetPollByTokenResponse {
  string poll_id = 1;
  string title = 2;
  repeated Question questions = 3;
}

message SubmitResponseRequest {
  string token = 1;
  repeated Answer answers = 2;
}

message SubmitResponseResponse {
  bool ok = 1;
}

// owner_user_id from the JWT subject; the service enforces owner-scoped authz.
message GetResponsesRequest {
  string poll_id = 1;
  string owner_user_id = 2;
}

message PollResponse {
  string id = 1;
  repeated Answer answers = 2;
  string submitted_at = 3;
}

message GetResponsesResponse {
  repeated PollResponse responses = 1;
}

service Poll {
  rpc CreatePoll(CreatePollRequest) returns (CreatePollResponse);
  rpc GetPollByToken(GetPollByTokenRequest) returns (GetPollByTokenResponse);
  rpc SubmitResponse(SubmitResponseRequest) returns (SubmitResponseResponse);
  rpc GetResponses(GetResponsesRequest) returns (GetResponsesResponse);
}
