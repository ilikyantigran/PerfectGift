<script>
const ADJ={"ios": ["gateway"], "android": ["gateway"], "pollweb": ["gateway"], "gateway": ["ios", "android", "catalog", "identity", "surprise", "pollweb", "poll"], "identity": ["id_store", "gateway"], "poll": ["surprise", "gateway", "nats", "poll_store"], "catalog": ["surprise", "gateway", "catalog_store"], "surprise": ["nats", "surprise_store", "catalog", "anthropic", "gateway", "poll"], "nats": ["surprise", "notification", "poll"], "anthropic": ["surprise"], "notification": ["apnsfcm", "nats"], "apnsfcm": ["notification"], "id_store": ["identity"], "poll_store": ["poll"], "catalog_store": ["catalog"], "surprise_store": ["surprise"]};
const svg=document.getElementById('svg');
const nodes=[...document.querySelectorAll('.node')],edges=[...document.querySelectorAll('.edge')],pkts=[...document.querySelectorAll('.pkt')];
let locked=null;
function apply(id){
 if(!id){nodes.forEach(n=>n.classList.remove('dim'));edges.forEach(e=>{e.classList.remove('hot');e.style.opacity=1});pkts.forEach(p=>p.style.opacity=1);return}
 const keep=new Set([id,...ADJ[id]]);
 nodes.forEach(n=>n.classList.toggle('dim',!keep.has(n.dataset.id)));
 const on=e=>e.dataset.src===id||e.dataset.dst===id;
 edges.forEach(e=>{e.classList.toggle('hot',on(e));e.style.opacity=on(e)?1:0.1});
 pkts.forEach(p=>p.style.opacity=on(p)?1:0.05);
}
nodes.forEach(n=>{
 n.addEventListener('mouseenter',()=>{if(!locked)apply(n.dataset.id)});
 n.addEventListener('mouseleave',()=>{if(!locked)apply(null)});
 n.addEventListener('click',e=>{e.stopPropagation();locked=locked===n.dataset.id?null:n.dataset.id;apply(locked)});
});
svg.addEventListener('click',()=>{locked=null;apply(null)});
let vb={x:0,y:0,w:1720,h:1040};
function setVB(){svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`)}
document.getElementById('reset').addEventListener('click',()=>{vb={x:0,y:0,w:1720,h:1040};setVB();locked=null;apply(null)});
svg.addEventListener('wheel',e=>{e.preventDefault();const r=svg.getBoundingClientRect();
 const mx=vb.x+(e.clientX-r.left)/r.width*vb.w,my=vb.y+(e.clientY-r.top)/r.height*vb.h,k=e.deltaY<0?0.9:1.1;
 vb.w=Math.max(300,Math.min(1720*2,vb.w*k));vb.h=Math.max(200,Math.min(1040*2,vb.h*k));
 vb.x=mx-(e.clientX-r.left)/r.width*vb.w;vb.y=my-(e.clientY-r.top)/r.height*vb.h;setVB()},{passive:false});
let drag=null;
svg.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY,vx:vb.x,vy:vb.y};svg.classList.add('grab')});
window.addEventListener('pointermove',e=>{if(!drag)return;const r=svg.getBoundingClientRect();
 vb.x=drag.vx-(e.clientX-drag.x)/r.width*vb.w;vb.y=drag.vy-(e.clientY-drag.y)/r.height*vb.h;setVB()});
window.addEventListener('pointerup',()=>{drag=null;svg.classList.remove('grab')});
</script></body></html>
